    <meta name="theme-color" content="#6366f1" />

      try {
        var t = localStorage.getItem('clientflow.theme.v1');
        if (t === 'dark') document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
